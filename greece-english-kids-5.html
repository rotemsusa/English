<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🇬🇷 האנגלית שלי ביוון</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&family=Nunito:wght@700;800;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: linear-gradient(160deg, #e8f4fd 0%, #c8e0f5 100%);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: linear-gradient(135deg, #1a86d0, #0d5fa3);
    color: white;
    text-align: center;
    padding: 10px 16px;
    flex-shrink: 0;
  }
  header h1 { font-family: 'Nunito', sans-serif; font-size: 1.3rem; font-weight: 900; }

  .tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 8px 10px;
    scrollbar-width: none;
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    flex-shrink: 0;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: white;
    border: 2px solid #1a86d0;
    color: #1a86d0;
    border-radius: 50px;
    padding: 5px 13px;
    font-size: 0.8rem;
    font-family: 'Heebo', sans-serif;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .tab-btn.active { background: #1a86d0; color: white; }

  /* NAV */
  .nav-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    flex-shrink: 0;
  }
  .nav-btn {
    background: #1a86d0;
    color: white;
    border: none;
    border-radius: 50%;
    width: 44px; height: 44px;
    font-size: 1.3rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 10px rgba(26,134,208,0.3);
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:active { transform: scale(0.9); }
  .nav-btn:disabled { background: #ccc; box-shadow: none; }
  .progress-bar { flex: 1; height: 7px; background: #dde; border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: #1a86d0; border-radius: 10px; transition: width 0.3s; }
  .counter { font-size: 0.8rem; color: #888; font-weight: 700; white-space: nowrap; }

  /* CARD */
  .card-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px 12px;
    min-height: 0;
  }

  .flashcard {
    background: white;
    border-radius: 22px;
    box-shadow: 0 6px 24px rgba(26,134,208,0.18);
    border-top: 5px solid #1a86d0;
    width: 100%;
    max-width: 480px;
    padding: 22px 24px 20px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 8px;
  }
  .flashcard.emergency { border-top-color: #ff4444; }

  .badge {
    font-size: 0.72rem; font-weight: 700;
    padding: 2px 12px; border-radius: 50px;
  }
  .badge.challenge { background: #FFD60A; color: #333; }
  .badge.emergency-b { background: #ff4444; color: white; }
  .badge.hidden { display: none; }

  .sec-label { font-size: 0.78rem; color: #aaa; font-weight: 600; }

  .english-text {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(1.2rem, 4.5vw, 1.7rem);
    font-weight: 900;
    color: #0d5fa3;
    direction: ltr;
    line-height: 1.3;
  }
  .phonetic-text {
    font-size: clamp(0.78rem, 2.8vw, 0.92rem);
    color: #aaa; direction: ltr; font-style: italic;
  }
  .divider {
    width: 55%; border: none;
    border-top: 2px dashed #c8e0f5;
    margin: 4px 0;
  }
  .hebrew-text {
    font-size: clamp(1.05rem, 4vw, 1.45rem);
    font-weight: 700; color: #222; line-height: 1.4;
  }
  .tip-text { font-size: 0.8rem; color: #888; }
  .tap-hint { font-size: 0.82rem; color: #1a86d0; font-weight: 700; margin-top: 4px; }

  .hidden { display: none !important; }
</style>
</head>

<header><h1>🇬🇷 האנגלית שלי ביוון</h1></header>

<div class="tabs" id="tabs"></div>

<div class="nav-row">
  <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">‹</button>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <span class="counter" id="counter"></span>
  <button class="nav-btn" id="btn-next" onclick="navigate(1)">›</button>
</div>

<div class="card-area">

    <hr class="divider hidden" id="card-divider">

    <div class="tip-text hidden" id="card-tip"></div>
    <div class="tap-hint" id="tap-hint">👆 לחץ לתרגום</div>
  </div>
</div>

const SECTIONS = [
  {id:'all',    label:'⭐ הכל'},
  {id:'words',  label:'📝 מילים'},
  {id:'breakfast',label:'🍳 אוכל'},
  {id:'taxi',   label:'🚕 מונית'},
  {id:'hotel',  label:'🛎️ מלון'},
  {id:'cleaning',label:'🧹 ניקיון'},
  {id:'pool',   label:'🏊 בריכה'},
  {id:'shop',   label:'🛍️ חנות'},
  {id:'tourist',label:'🏛️ טיולים'},
  {id:'emergency',label:'🆘 חירום'},
];

let filtered = [...ALL_CARDS];
let idx = 0;
let revealed = false;

function buildTabs() {
  const tabs = document.getElementById('tabs');
  SECTIONS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (s.id==='all'?' active':'');
    btn.textContent = s.label;
    btn.addEventListener('click', () => selectSection(s.id, btn));
    tabs.appendChild(btn);
  });
}

function selectSection(id, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filtered = id==='all' ? [...ALL_CARDS] : ALL_CARDS.filter(c=>c.sec_id===id);
  idx = 0;
  showCard();
}

function showCard() {
  revealed = false;
  const c = filtered[idx];

  document.getElementById('flashcard').className = 'flashcard' + (c.is_emergency?' emergency':'');
  document.getElementById('card-section').textContent = c.sec_label;
  document.getElementById('card-english').textContent = c.english;
  document.getElementById('card-phonetic').textContent = c.phonetic;
  document.getElementById('card-hebrew').textContent = c.hebrew;

  const badge = document.getElementById('card-badge');
  if (c.badge) {
    badge.textContent = c.badge;
    badge.className = 'badge ' + (c.is_emergency ? 'emergency-b' : 'challenge');
  } else {
    badge.className = 'badge hidden';
  }

  const tip = document.getElementById('card-tip');
  tip.textContent = c.tip || '';
  tip.className = 'tip-text hidden';

  document.getElementById('card-divider').className = 'divider hidden';
  document.getElementById('card-hebrew').className = 'hebrew-text hidden';
  document.getElementById('tap-hint').className = 'tap-hint';

  document.getElementById('counter').textContent = (idx+1)+' / '+filtered.length;
  const pct = filtered.length>1 ? (idx/(filtered.length-1))*100 : 100;
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('btn-prev').disabled = idx===0;
  document.getElementById('btn-next').disabled = idx===filtered.length-1;
}

function navigate(dir) {
  const ni = idx+dir;
  if (ni>=0 && ni<filtered.length) { idx=ni; showCard(); }
}

const fc = document.getElementById('flashcard');
let startX = 0, startY = 0;

fc.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
}, {passive:true});

fc.addEventListener('touchend', e => {
  const dx = Math.abs(e.changedTouches[0].clientX - startX);
  const dy = Math.abs(e.changedTouches[0].clientY - startY);
  if (dx < 20 && dy < 20) {
    e.preventDefault();
    toggleReveal();
  }
});

function toggleReveal() {
  revealed = !revealed;
  document.getElementById('card-divider').className = 'divider' + (revealed?'':' hidden');
  document.getElementById('card-hebrew').className = 'hebrew-text' + (revealed?'':' hidden');
  document.getElementById('tap-hint').className = 'tap-hint' + (revealed?' hidden':'');
  const c = filtered[idx];
  if (c.tip) document.getElementById('card-tip').className = 'tip-text' + (revealed?'':' hidden');
}

buildTabs();
showCard();
</script>
