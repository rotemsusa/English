<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇬🇷 האנגלית שלי ביוון</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&family=Nunito:wght@700;800;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: linear-gradient(160deg, #e8f4fd 0%, #c8e0f5 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1a86d0 0%, #0d5fa3 100%);
    color: white;
    text-align: center;
    padding: 14px 16px 10px;
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Nunito', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
  }

  .tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 10px 12px;
    scrollbar-width: none;
    flex-shrink: 0;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab-btn {
    background: white;
    border: 2px solid #1a86d0;
    color: #1a86d0;
    border-radius: 50px;
    padding: 6px 14px;
    font-size: 0.82rem;
    font-family: 'Heebo', sans-serif;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .tab-btn.active {
    background: #1a86d0;
    color: white;
  }

  /* FLASHCARD AREA */
  .flashcard-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    position: relative;
  }

  .counter {
    font-size: 0.85rem;
    color: #888;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .card-wrapper {
    width: 100%;
    max-width: 500px;
    flex: 1;
    max-height: 65vh;
    position: relative;
  }

  .flashcard {
    width: 100%;
    height: 100%;
    background: white;
    border-radius: 24px;
    box-shadow: 0 8px 32px rgba(26,134,208,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 28px;
    cursor: pointer;
    transition: transform 0.15s;
    border-top: 6px solid #1a86d0;
    text-align: center;
    position: relative;
    gap: 0;
  }

  .flashcard.emergency {
    border-top-color: #ff4444;
  }

  .flashcard:active { transform: scale(0.97); }

  .badge {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 3px 14px;
    border-radius: 50px;
    margin-bottom: 20px;
  }
  .badge.challenge { background: #FFD60A; color: #333; }
  .badge.emergency { background: #ff4444; color: white; }

  .section-label {
    font-size: 0.8rem;
    color: #aaa;
    font-weight: 600;
    margin-bottom: 16px;
  }

  .english-text {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(1.4rem, 5vw, 2rem);
    font-weight: 900;
    color: #0d5fa3;
    direction: ltr;
    line-height: 1.3;
    margin-bottom: 10px;
  }

  .phonetic-text {
    font-size: clamp(0.85rem, 3vw, 1rem);
    color: #999;
    direction: ltr;
    font-style: italic;
    margin-bottom: 24px;
  }

  .divider {
    width: 60%;
    border: none;
    border-top: 2px dashed #c8e0f5;
    margin: 0 auto 24px;
  }

  .hebrew-text {
    font-size: clamp(1.2rem, 4.5vw, 1.7rem);
    font-weight: 700;
    color: #222;
    line-height: 1.4;
  }

  .tip-text {
    font-size: 0.85rem;
    color: #888;
    margin-top: 10px;
  }

  .tap-hint {
    font-size: 0.85rem;
    color: #1a86d0;
    font-weight: 700;
    margin-top: 28px;
  }

  .hidden { display: none; }

  /* NAV BUTTONS */
  .nav-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 16px;
    flex-shrink: 0;
  }

  .nav-btn {
    background: #1a86d0;
    color: white;
    border: none;
    border-radius: 50%;
    width: 52px;
    height: 52px;
    font-size: 1.4rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 14px rgba(26,134,208,0.35);
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .nav-btn:active { transform: scale(0.93); }
  .nav-btn:disabled { background: #ccc; box-shadow: none; cursor: default; }

  .progress-bar {
    flex: 1;
    height: 8px;
    background: #dde;
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #1a86d0;
    border-radius: 10px;
    transition: width 0.3s;
  }
</style>
</head>
<body>

<header>
  <h1>🇬🇷 האנגלית שלי ביוון</h1>
</header>

<div class="tabs" id="tabs"></div>

<div class="flashcard-area">
  <div class="counter" id="counter"></div>
  <div class="card-wrapper">
    <div class="flashcard" id="flashcard" onclick="">
      <div class="section-label" id="card-section"></div>
      <div class="badge hidden" id="card-badge"></div>
      <div class="english-text" id="card-english"></div>
      <div class="phonetic-text" id="card-phonetic"></div>
      <hr class="divider hidden" id="card-divider">
      <div class="hebrew-text hidden" id="card-hebrew"></div>
      <div class="tip-text hidden" id="card-tip"></div>
      <div class="tap-hint" id="tap-hint">👆 לחץ לתרגום</div>
    </div>
  </div>

  <div class="nav-row">
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">‹</button>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <button class="nav-btn" id="btn-next" onclick="navigate(1)">›</button>
  </div>
</div>

const SECTIONS = [
  {id:'all', label:'⭐ הכל'},
  {id:'breakfast', label:'🍳 אוכל'},
  {id:'taxi', label:'🚕 מונית'},
  {id:'hotel', label:'🛎️ מלון'},
  {id:'cleaning', label:'🧹 ניקיון'},
  {id:'pool', label:'🏊 בריכה'},
  {id:'shop', label:'🛍️ חנות'},
  {id:'tourist', label:'🏛️ טיולים'},
  {id:'emergency', label:'🆘 חירום'},
];

let currentSection = 'all';
let filteredCards = [];
let currentIndex = 0;
let revealed = false;

function buildTabs() {
  const tabs = document.getElementById('tabs');
  SECTIONS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (s.id === 'all' ? ' active' : '');
    btn.textContent = s.label;
    btn.onclick = () => selectSection(s.id, btn);
    tabs.appendChild(btn);
  });
}

function selectSection(id, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSection = id;
  filteredCards = id === 'all' ? ALL_CARDS : ALL_CARDS.filter(c => c.sec_id === id);
  currentIndex = 0;
  showCard();
}

function showCard() {
  revealed = false;
  const card = filteredCards[currentIndex];
  const fc = document.getElementById('flashcard');

  fc.classList.toggle('emergency', card.is_emergency);

  document.getElementById('card-section').textContent = card.sec_label;
  document.getElementById('card-english').textContent = card.english;
  document.getElementById('card-phonetic').textContent = card.phonetic;
  document.getElementById('card-hebrew').textContent = card.hebrew;

  const badge = document.getElementById('card-badge');
  if (card.badge) {
    badge.textContent = card.badge;
    badge.className = 'badge ' + (card.is_emergency ? 'emergency' : 'challenge');
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }

  const tip = document.getElementById('card-tip');
  if (card.tip) {
    tip.textContent = card.tip;
  } else {
    tip.classList.add('hidden');
  }

  // Hide hebrew/divider
  document.getElementById('card-divider').classList.remove('hidden');
  document.getElementById('card-hebrew').classList.remove('hidden');
  if (card.tip) document.getElementById('card-tip').classList.remove('hidden');
  document.getElementById('tap-hint').classList.add('hidden');

  // Counter
  document.getElementById('counter').textContent = (currentIndex+1) + ' / ' + filteredCards.length;

  // Progress
  const pct = filteredCards.length > 1 ? (currentIndex / (filteredCards.length-1)) * 100 : 100;
  document.getElementById('progress-fill').style.width = pct + '%';

  // Buttons
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === filteredCards.length - 1;
}

function toggleReveal() {
  revealed = !revealed;
  document.getElementById('card-divider').classList.toggle('hidden', !revealed);
  document.getElementById('card-hebrew').classList.toggle('hidden', !revealed);
  const card = filteredCards[currentIndex];
  if (card.tip) document.getElementById('card-tip').classList.toggle('hidden', !revealed);
  document.getElementById('tap-hint').classList.toggle('hidden', revealed);
}

function navigate(dir) {
  const newIdx = currentIndex + dir;
  if (newIdx >= 0 && newIdx < filteredCards.length) {
    currentIndex = newIdx;
    showCard();
  }
}

// Swipe support
let startX = 0;
document.getElementById('flashcard').addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive:true});
document.getElementById('flashcard').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - startX;
  if (Math.abs(dx) > 60) {
    // RTL: swipe right = prev, swipe left = next
    navigate(dx > 0 ? -1 : 1);
  }
}, {passive:true});

buildTabs();
filteredCards = ALL_CARDS;
showCard();
</script>
